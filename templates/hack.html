<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earbook - Terminal Scan</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Ensuring the body takes up full height and centers the box */
        .hack-body {
            background-color: #0a0a0a; /* Fallback dark color */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }

        /* The main container: adjusted for better spacing and visibility */
        .scanner-box {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #ff3333;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            padding: 40px 20px; /* Internal spacing */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
            box-sizing: border-box; /* Prevents padding from breaking width */
        }

        /* Header: moved down from the top */
        .scanner-box h1 {
            color: #ff3333;
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px; /* Space from top of box */
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        /* Image styling */
        .scan-img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px #ff3333);
        }

        /* Terminal styling */
        .terminal-hack {
            background: #000;
            color: #00ff00;
            width: 100%;
            height: 200px;
            padding: 15px;
            border-radius: 8px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #333;
            margin-bottom: 25px;
            box-sizing: border-box;
            text-align: left;
        }

        /* Button: Styled for full visibility */
        .btn-hack {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-hack:hover {
            background-color: #cc0000;
            box-shadow: 0 0 15px #ff3333;
            transform: scale(1.05);
        }

        /* Custom Scrollbar for the terminal */
        .terminal-hack::-webkit-scrollbar {
            width: 5px;
        }
        .terminal-hack::-webkit-scrollbar-thumb {
            background: #ff3333;
            border-radius: 10px;
        }
    </style>
</head>
<body class="hack-body">

    <div class="scanner-box">
        <h1>⚡ TARGETING EARBOOK</h1>
        
        <img src="/static/images/scanning.png" class="scan-img" alt="Scanning...">
        
        <div id="terminal" class="terminal-hack">
            Waiting to scan...
        </div>
        
        <button id="scanButton" class="btn-hack" onclick="startHack()">Execute Scan</button>
    </div>

    <script src="/static/js/hack.js"></script>
    <script>
        function typeLine(text, delay) {
            return new Promise(resolve => {
                setTimeout(() => {
                    let term = document.getElementById("terminal");
                    if (term.innerHTML.trim() === "Waiting to scan...") { 
                        term.innerHTML = ""; 
                    }
                    term.innerHTML += "> " + text + "<br>";
                    term.scrollTop = term.scrollHeight;
                    resolve();
                }, delay);
            });
        }
    </script>

</body>
</html>
