<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breach Successful - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Modern Hacker Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body.hacker-body {
            /* Background image with a dark overlay for readability */
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('/static/images/hacker_bg.png') no-repeat center center fixed;
            background-size: cover;
            color: #00ff41; /* Classic Matrix Green */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Animated Glow Header */
        .glow {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ff3333; /* Red for breach success */
            text-shadow: 0 0 10px #ff3333, 0 0 20px #ff3333;
            margin-bottom: 50px;
            text-align: center;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 100% { opacity: 1; }
            20%, 21.999%, 63%, 63.999% { opacity: 0.4; }
        }

        /* Flex Container for Cards */
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* Hacker Card Styling */
        .hacker-card {
            background: rgba(0, 20, 0, 0.8); /* Dark glass effect */
            backdrop-filter: blur(10px);
            border: 1px solid #00ff41;
            border-top: 4px solid #00ff41;
            padding: 25px;
            width: 320px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hacker-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
        }

        .hacker-card h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        /* Profile & Post Media */
        .profile-pic, .post-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 1px solid #00ff41;
            margin-bottom: 15px;
            filter: grayscale(1) brightness(0.8) sepia(1) hue-rotate(70deg); /* Makes images look like thermal/data views */
        }

        .data-row {
            font-size: 0.9rem;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }

        .label { color: #888; }
        .value { color: #fff; font-weight: bold; }

        .status-leaked {
            color: #ff3333;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Add a "Terminal Scanline" effect over the whole page */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="hacker-body">

    <h1 class="glow">💻 BREACH SUCCESSFUL</h1>

    <div class="dashboard-container">
        
        <div class="hacker-card">
            <h3>USER_DATA EXPOSED</h3>
            <img src="/static/images/user1.png" class="profile-pic" alt="Target Avatar">
            
            <div class="data-row">
                <span class="label">IDENTIFIER:</span>
                <span class="value">Bilal</span>
            </div>
            <div class="data-row">
                <span class="label">CREDENTIAL:</span>
                <span class="value" style="color: #ff3333; text-decoration: underline;">admin123</span>
            </div>
            <div class="data-row">
                <span class="label">LOCATION:</span>
                <span class="value">ISLAMABAD_PK</span>
            </div>
        </div>

        <div class="hacker-card">
            <h3>POST_INTERCEPTED</h3>
            <img src="/static/images/post1.png" class="post-img" alt="Leaked Content">
            
            <div class="data-row">
                <span class="label">SOURCE:</span>
                <span class="value">EARBOOK_MAIN</span>
            </div>
            <div class="data-row">
                <span class="label">STATUS:</span>
                <span class="status-leaked">CRITICAL / LEAKED</span>
            </div>
            <div class="data-row">
                <span class="label">ENCRYPTION:</span>
                <span class="value">BYPASSED</span>
            </div>
        </div>

    </div>

</body>
</html>
