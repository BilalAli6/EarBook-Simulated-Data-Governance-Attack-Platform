<!DOCTYPE html>
<html>
<head>
    <title>EarBook | Feed</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar">earbook</div>
    
    <div class="main-grid">
        <div class="sidebar-left">
            <p>🏠 Home</p>
            <p>👥 Friends</p>
            <p>📂 Groups</p>
        </div>

        <div class="feed">
            <div class="card">
                <div class="user-info">
                    <img src="/static/images/user1.png" class="profile-pic">
                    <div>
                        <strong>Bilal</strong><br>
                        <small>Just now • 🌍</small>
                    </div>
                </div>
                <p>Building the future of social media! 🚀 #EarBook</p>
                <img src="/static/images/post1.png" class="post-img">
            </div>

            <div class="card">
                <div class="user-info">
                    <img src="/static/images/user2.png" class="profile-pic">
                    <div>
                        <strong>Sara</strong><br>
                        <small>2 hours ago • 👥</small>
                    </div>
                </div>
                <p>The UI is looking so clean!</p>
                <img src="/static/images/post2.png" class="post-img">
            </div>
        </div>

        <div class="sidebar-right">
            <div class="card" style="background: #ffebe9; border: 1px solid #ff4d4d;">
                <h4 style="color: #d93025; margin: 0;">⚠️ Security Alert</h4>
                <p style="font-size: 0.8em;">System scan required.</p>
                <a href="/hack"><button class="btn-fb" style="background: #d93025;">Run Diagnostics</button></a>
            </div>
        </div>
    </div>
</body>
</html>
